http:
  timeout_seconds: 20
  user_agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko)
    Chrome/124.0 Safari/537.36 tg-watchbot/1.0
bot:
  rate_limit:
    window_seconds: 10
    max_messages: 3
  spam_filter:
    enabled: false
    auto_block: true
    keywords:
    - 投资
    - 博彩
    - 空投
  quick_replies:
  - title: 已收到
    text: 你好，消息已收到，我稍后处理。
monitors:
- name: NodeSeek 新帖
  type: rss
  url: https://rss.nodeseek.com/
  interval_seconds: 60
  keywords:
  - VPS
  - 优惠
  - 免费
  exclude_keywords: []
  authors: []
  categories: []
  notify_on:
    keyword_match: true
    new_item: true
    price_change: false
    stock_change: false
  notify_telegram: true
  forum: true
- name: Linux.do 最新
  type: rss
  url: https://linux.do/latest.rss
  interval_seconds: 60
  keywords:
  - API
  - 教程
  - 开源
  exclude_keywords: []
  authors: []
  categories: []
  notify_on:
    keyword_match: true
    new_item: true
    price_change: false
    stock_change: false
  notify_telegram: true
  forum: true
cleanup:
  enabled: true
  interval_minutes: 60
  monitor_message_delete_after_minutes: 60
  monitor_retention_minutes: 1440
